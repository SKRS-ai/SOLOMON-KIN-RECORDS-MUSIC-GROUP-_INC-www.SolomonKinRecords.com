<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SKR | ARTIST ONBOARDING & DEPOSITORY</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; --panel: #111; --neon-blue: #00f3ff; }
        body { background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; margin: 0; padding-bottom: 50px; }
        
        .onboarding-header {
            padding: 60px 5%; text-align: center; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('studio-console.jpg');
            border-bottom: 1px solid var(--gold);
        }

        .portal-container { max-width: 800px; margin: -50px auto 0; background: var(--panel); border: 1px solid #333; padding: 40px; border-radius: 8px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }

        h2 { font-family: 'Orbitron', sans-serif; color: var(--gold); letter-spacing: 2px; }

        .form-section { margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 20px; }
        label { display: block; margin-bottom: 10px; color: #888; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
        
        input[type="text"], input[type="email"], input[type="password"], textarea {
            width: 100%; padding: 12px; background: #0a0a0a; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box;
            font-family: 'Rajdhani', sans-serif; font-size: 1rem;
        }

        .upload-box {
            border: 2px dashed #444; padding: 30px; text-align: center; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .upload-box:hover { border-color: var(--neon-blue); background: #1a1a1a; }

        .btn-submit {
            background: var(--gold); color: black; border: none; padding: 15px 40px; font-family: 'Orbitron', sans-serif;
            font-weight: bold; width: 100%; cursor: pointer; font-size: 1.1rem; margin-top: 20px;
        }
        .btn-submit:hover { background: #fff; box-shadow: 0 0 20px var(--gold); }

        .status-badge { display: inline-block; padding: 5px 15px; background: #222; border-radius: 20px; font-size: 0.7rem; color: var(--neon-blue); border: 1px solid var(--neon-blue); margin-bottom: 15px; }
    </style>
</head>
<body>

<section class="onboarding-header">
    <div class="status-badge">SECURE TRANSMISSION ACTIVE</div>
    <h1 style="font-family: 'Orbitron'; font-size: 2.5rem; margin: 0;">ARTIST REGISTRATION</h1>
    <p style="color: var(--gold);">Establish your node within the SKR Ecosystem.</p>
</section>

<div class="portal-container">
    <form action="#">
        <div class="form-section">
            <h2>01. ARTIST IDENTITY</h2>
            <label>Stage Name / Entity Name</label>
            <input type="text" placeholder="e.g. Synthetic Star 005" required>
            
            <div style="display: flex; gap: 20px; margin-top: 20px;">
                <div style="flex: 1;">
                    <label>Primary Genre</label>
                    <input type="text" placeholder="e.g. Cyber-Soul">
                </div>
                <div style="flex: 1;">
                    <label>Location Node</label>
                    <input type="text" placeholder="e.g. New York / Digital">
                </div>
            </div>
        </div>

        <div class="form-section">
            <h2>02. LOGIN CREDENTIALS</h2>
            <label>Email Address</label>
            <input type="email" placeholder="agent@skr-records.com" required>
            <label style="margin-top:20px;">Secure Password</label>
            <input type="password" placeholder="••••••••">
        </div>

        <div class="form-section">
            <h2>03. THE DEPOSITORY</h2>
            <label>Profile Image (High-Res Persona Asset)</label>
            <div class="upload-box">
                <p>Drag & Drop Image or Click to Browse</p>
                <input type="file" style="display:none;" id="imgUpload">
            </div>

            <label style="margin-top:20px;">Audio Submission (Primary Track for Radio Rotation)</label>
            <div class="upload-box">
                <p>Drag & Drop .WAV / .MP3</p>
                <input type="file" style="display:none;" id="audioUpload">
            </div>
        </div>

        <div class="form-section">
            <h2>04. ARTIST MANIFESTO</h2>
            <label>Brief Biography / Sonic Mission</label>
            <textarea rows="4" placeholder="Tell the world who you are..."></textarea>
        </div>

        <button type="submit" class="btn-submit">FINALIZE CONTRACT & SIGN UP</button>
    </form>
</div>

</body>
</html>
